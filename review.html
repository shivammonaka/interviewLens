<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>InterviewLens — AI Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff00;
      --accent2: #ff3c3c;
      --text: #f0f0f0;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(232,255,0,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,0,.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 40px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 5px;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(232,255,0,.35);
      line-height: 1;
    }

    .header-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 6px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-optional {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .field-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      transition: border-color .2s;
      letter-spacing: .3px;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    #problemInput { min-height: 90px; }
    #codeInput    { min-height: 130px; }

    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      padding: 11px 22px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    .btn-primary:hover { background: #fff; }

    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: #444; }

    #loadingState, #emptyState {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
    }

    .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty-title { font-size: 14px; letter-spacing: 2px; color: var(--text); margin-bottom: 10px; }
    .empty-desc { font-size: 10px; color: var(--muted); line-height: 1.8; }

    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--accent);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { color: var(--accent2); border-color: rgba(255,60,60,.3); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    @media (max-width: 600px) {
      .page { padding: 24px 16px 60px; }
      .logo { font-size: 32px; }
      .action-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="logo">INTERVIEWLENS</div>
      <div class="header-sub">AI Review</div>
    </div>

    <div id="loadingState">Loading…</div>

    <div id="emptyState" style="display:none">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No Transcript Found</div>
      <div class="empty-desc">
        Transcribe a recording first, then click<br>
        "Copy for LLM" to open this page.
      </div>
    </div>

    <div id="mainContent" style="display:none">

      <div class="section">
        <div class="section-title">
          Problem Statement <span class="badge-optional">Optional</span>
        </div>
        <div class="field-label">Paste the interview problem here</div>
        <textarea id="problemInput" placeholder="e.g. Given an array of integers, return indices of the two numbers that add up to a target…"></textarea>
      </div>

      <div class="section">
        <div class="section-title">
          Your Code <span class="badge-optional">Optional</span>
        </div>
        <div class="field-label">Paste your solution here</div>
        <textarea id="codeInput" placeholder="def two_sum(nums, target):
    seen = {}
    for i, n in enumerate(nums):
        if target - n in seen:
            return [seen[target - n], i]
        seen[n] = i"></textarea>
      </div>

      <div class="action-bar">
        <button class="btn btn-primary" id="copyBtn">
          <span>📋</span> Copy Prompt for LLM
        </button>
        <button class="btn btn-ghost" id="openClaudeBtn">
          <span>🤖</span> Open Claude
        </button>
        <button class="btn btn-ghost" id="openChatGptBtn">
          <span>💬</span> Open ChatGPT
        </button>
      </div>

    </div>
  </div>

  <div id="toast"></div>
  <script src="review.js"></script>
</body>
</html>
