<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>InterviewLens — Generate LLM Prompt</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0a; --surface:#111; --border:#222; --accent:#e8ff00; --accent2:#ff3c3c; --text:#f0f0f0; --muted:#555; --green:#4caf50; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(232,255,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,0,.03) 1px,transparent 1px); background-size:20px 20px; }

    .page { max-width:860px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:1; }

    .header { display:flex; align-items:baseline; gap:16px; margin-bottom:40px; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; color:var(--accent); text-shadow:0 0 20px rgba(232,255,0,.3); }
    .header-sub { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    @media (max-width:640px) { .grid { grid-template-columns:1fr; } }

    .field { display:flex; flex-direction:column; gap:8px; }
    .field-label { font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
    .field-hint { font-size:10px; color:var(--muted); line-height:1.6; }
    textarea {
      background:var(--surface); border:1px solid var(--border); border-radius:6px;
      padding:12px 14px; color:var(--text); font-family:'Space Mono',monospace;
      font-size:12px; line-height:1.7; outline:none; resize:vertical;
      transition:border-color .2s; width:100%;
    }
    textarea:focus { border-color:var(--accent); }
    textarea::placeholder { color:var(--muted); }
    #problemInput { min-height:180px; }
    #codeInput    { min-height:180px; }

    .transcript-box {
      background:var(--surface); border:1px solid var(--border); border-radius:6px;
      padding:14px; font-size:11px; line-height:1.8; color:var(--muted);
      max-height:120px; overflow-y:auto; white-space:pre-wrap; word-break:break-word;
      margin-bottom:20px;
    }
    .transcript-box::-webkit-scrollbar { width:3px; }
    .transcript-box::-webkit-scrollbar-thumb { background:var(--border); }
    .transcript-box.loaded { color:var(--text); }

    .actions { display:flex; gap:12px; align-items:center; }
    .copy-btn {
      font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px;
      text-transform:uppercase; background:var(--accent); color:#000;
      border:none; padding:14px 32px; border-radius:4px; cursor:pointer;
      transition:all .2s; font-weight:700;
    }
    .copy-btn:hover { background:#fff; }
    .copy-btn:disabled { opacity:.4; cursor:not-allowed; }
    .copy-btn.copied { background:var(--green); color:#000; }
    .status-msg { font-size:10px; letter-spacing:1px; color:var(--muted); }
    .status-msg.ok { color:var(--green); }
    .status-msg.err { color:var(--accent2); }

    .section-label { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">INTERVIEWLENS</div>
    <div class="header-sub">Generate LLM Prompt</div>
  </div>

  <!-- Transcript preview -->
  <div class="section-label">Transcript</div>
  <div class="transcript-box" id="transcriptPreview">Loading transcript…</div>

  <!-- Problem + Code -->
  <div class="section-label">Context (optional)</div>
  <div class="grid">
    <div class="field">
      <label class="field-label" for="problemInput">Problem Statement</label>
      <div class="field-hint">Paste the question from Leetcode, HackerRank, etc.</div>
      <textarea id="problemInput" placeholder="Paste the problem description here…"></textarea>
    </div>
    <div class="field">
      <label class="field-label" for="codeInput">Your Code</label>
      <div class="field-hint">Paste the solution you wrote during the interview.</div>
      <textarea id="codeInput" placeholder="Paste your solution here…"></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="copy-btn" id="copyBtn" disabled>Copy full prompt</button>
    <span class="status-msg" id="statusMsg"></span>
  </div>
</div>

<script>
// ── Load template from storage ─────────────────────────────────────────────
const DEFAULT_LLM_TEMPLATE =
`You are an expert technical interview coach. Analyze the following interview transcript and give me brutally honest, actionable feedback.

---

{{transcript}}

---
{{problem}}{{code}}
Evaluate me on these dimensions:

**Communication**
- Did I explain my thought process out loud before coding?
- Did I walk through my approach step by step?
- Did I talk while coding or go silent?
- Did I ask clarifying questions?

**Technical Reasoning**
- Did I discuss the algorithm and why I chose it?
- Did I mention time and space complexity?
- Did I consider edge cases?
- Did I propose brute force first then optimize?

**Problem Solving Approach**
- Did I break the problem down before jumping to code?
- Did I get stuck and how did I recover?
- Did I validate my solution with examples?

**Strong Points**
List what I did well. Be specific with moments from the transcript.

**Weak Points & What to Improve**
List exactly where I fumbled. Be direct — no sugarcoating. For each weak point, tell me specifically what I should have said or done instead.

**Overall Assessment**
One short paragraph summary. End with the single most important habit I need to build before my next interview.`;

async function buildPrompt(transcript, problem, code) {
  const { llmTemplate } = await chrome.storage.local.get('llmTemplate');
  const template = (llmTemplate && llmTemplate.trim()) || DEFAULT_LLM_TEMPLATE;
  const problemSection = problem.trim() ? `\n**Problem Statement:**\n${problem.trim()}\n` : '';
  const codeSection    = code.trim()    ? `\n**My Code:**\n\`\`\`\n${code.trim()}\n\`\`\`\n` : '';
  return template
    .replace(/\{\{transcript\}\}/g, transcript)
    .replace(/\{\{problem\}\}/g, problemSection)
    .replace(/\{\{code\}\}/g, codeSection);
}

// ── Init ───────────────────────────────────────────────────────────────────
const preview   = document.getElementById('transcriptPreview');
const copyBtn   = document.getElementById('copyBtn');
const statusMsg = document.getElementById('statusMsg');

let transcript = '';

async function waitForTranscript(maxWaitMs = 5000) {
  const start = Date.now();
  while (Date.now() - start < maxWaitMs) {
    const result = await chrome.storage.local.get('llmTranscript');
    if (result.llmTranscript) return result.llmTranscript;
    await new Promise(r => setTimeout(r, 150));
  }
  return null;
}

waitForTranscript().then(t => {
  if (t) {
    transcript = t;
    preview.textContent = transcript;
    preview.classList.add('loaded');
    copyBtn.disabled = false;
    chrome.storage.local.remove('llmTranscript');
  } else {
    preview.textContent = 'No transcript found. Open the extension, transcribe a recording, then click "Generate LLM Prompt".';
    statusMsg.textContent = 'No transcript loaded.';
    statusMsg.className = 'status-msg err';
  }
});

copyBtn.addEventListener('click', async () => {
  const problem = document.getElementById('problemInput').value;
  const code    = document.getElementById('codeInput').value;
  const prompt  = await buildPrompt(transcript, problem, code);
  try {
    await navigator.clipboard.writeText(prompt);
    copyBtn.textContent = '✓ Copied!';
    copyBtn.classList.add('copied');
    statusMsg.textContent = 'Prompt copied — paste it into your LLM.';
    statusMsg.className = 'status-msg ok';
    setTimeout(() => {
      copyBtn.textContent = 'Copy full prompt';
      copyBtn.classList.remove('copied');
    }, 3000);
  } catch {
    statusMsg.textContent = 'Copy failed — try again.';
    statusMsg.className = 'status-msg err';
  }
});
</script>
</body>
</html>
